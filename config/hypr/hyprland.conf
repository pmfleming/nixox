$terminal = ghostty
$browser = zen
$menu = rofi -show drun

monitor = ,preferred,auto,1

exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypr-monitor-auto

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GTK_THEME,Adwaita:dark
env = QT_QPA_PLATFORMTHEME,gtk3
env = NIXOS_OZONE_WL,1

input {
  kb_layout = us,gb
  kb_variant = intl,
  follow_mouse = 1

  touchpad {
    natural_scroll = true
  }
}


general {
  gaps_in = 1
  gaps_out = 2
  border_size = 1
  col.active_border = rgba(2f8cffee)
  col.inactive_border = rgba(202020aa)
  layout = dwindle
}

decoration {
  rounding = 3
  active_opacity = 1.0
  inactive_opacity = 0.96

  blur {
    enabled = true
    size = 2
    passes = 1
    vibrancy = 0.12
  }
}

animations {
  enabled = true

  bezier = easeOut, 0.16, 1, 0.3, 1

  animation = windows, 1, 2, easeOut
  animation = border, 1, 2, easeOut
  animation = fade, 1, 2, easeOut
  animation = workspaces, 1, 2, easeOut
}

dwindle {
  preserve_split = true
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  force_default_wallpaper = 0
}

workspace = 1, default:true
workspace = 2
workspace = 3
workspace = 4
workspace = 5

windowrule = workspace 1 silent, match:class ^(com.mitchellh.ghostty|ghostty)$
windowrule = workspace 2 silent, match:class ^(zen|zen-browser|Zen|google-chrome|Google-chrome)$
windowrule = workspace 3 silent, match:class ^(Code|code|VSCodium|codium)$
windowrule = workspace 4 silent, match:class ^(Spotify)$

bind = SUPER, RETURN, exec, $terminal
bind = SUPER, SPACE, exec, $menu
bind = SUPER, B, exec, $browser
bind = SUPER, P, exec, nwg-displays
bind = SUPER, V, exec, cliphist list | rofi -dmenu -p clipboard | cliphist decode | wl-copy
bind = SUPER, L, exec, hyprlock
bind = SUPER, Q, killactive
bind = SUPER, F, togglefloating
bind = SUPER SHIFT, F, fullscreen
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

bind = SUPER, LEFT, movefocus, l
bind = SUPER, RIGHT, movefocus, r
bind = SUPER, UP, movefocus, u
bind = SUPER, DOWN, movefocus, d
bind = SUPER SHIFT, LEFT, movewindow, l
bind = SUPER SHIFT, RIGHT, movewindow, r
bind = SUPER SHIFT, UP, movewindow, u
bind = SUPER SHIFT, DOWN, movewindow, d
bind = SUPER CTRL, LEFT, resizeactive, -30 0
bind = SUPER CTRL, RIGHT, resizeactive, 30 0
bind = SUPER CTRL, UP, resizeactive, 0 -30
bind = SUPER CTRL, DOWN, resizeactive, 0 30

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
